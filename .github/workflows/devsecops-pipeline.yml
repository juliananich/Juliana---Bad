name: Vulnerable DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
    
jobs:
  security-dependencies:
    runs-on: ubuntu-latest
    # Added for demo: forces the pipeline to continue so we can see all failures
    continue-on-error: true 
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.8'
      - run: pip install -r requirements.txt pip-audit
      - name: Dependency Vulnerability Scan with pip-audit
        run: pip-audit -r requirements.txt

  unit-tests:
    runs-on: ubuntu-latest
    needs: security-dependencies
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.8'
      - run: pip install -r requirements.txt pytest
      - name: Run Unit Tests
        run: pytest tests/ -v

  build-and-scan-container:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t secure-app:latest .
      - name: Container Vulnerability Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'secure-app:latest'
          format: 'table'
          exit-code: '1' # This will trigger the final pipeline failure
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'